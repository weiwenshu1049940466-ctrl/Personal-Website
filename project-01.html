          <h1>희(囍)</h1>
          <p>
            노래 에는 여러 해석이 존재한다. 작사가가 선택한 이야기에서는 관원과 여주인공이
            혼인을 약속한 사이였지만, 관원이 다른 지역으로 부임하게 된다. 그 사이 여주인공은
            마을의 다른 남성을 사랑하게 되지만, 관원이 불행히도 세상을 떠나고, 그녀는 강제로
            혼례를 치르게 된다. 이 혼례는 죽은 사람과의 혼례, 즉 명혼이었다.
          </p>
